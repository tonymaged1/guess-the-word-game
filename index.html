<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="guess.css">
</head>
<body>
    <h1></h1>
    <div class="guess-game">
        <div class="game-area">
            <div class="inputs"></div>
            <div class="controls">
                <button class="check">check</button>
                <button class="hint"><span></span>hint</button>
            </div>
            <div class="message"></div>
        </div>
        <div class="key-colors">
            <h2>key-colors</h2>
            <div class="key-color">
                <div class="key in-place"></div>
                <div class="key-text">Letter is corrct in place</div>
            </div>
            <div class="key-color">
                <div class="key not-in-place"></div>
                <div class="key-text">Letter is corrct but not in place</div>
            </div>
            <div class="key-color">
                <div class="key no"></div>
                <div class="key-text">leatter is wront</div>
            </div>         
        </div>
    </div>
    <footer></footer>
    <script src="guess.js"></script>
    
</body>
</html>
